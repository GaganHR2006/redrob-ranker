ai_usage_summary: |
  Used Gemini (Google) as a coding assistant for architecture design, code
  generation, and debugging throughout the project. All candidate data remained
  local — no candidate profiles were sent to any LLM. The scoring logic,
  phrase banks, and ranking weights were designed and verified by the participant.
  AI tools were used as a pair programmer, not as a substitute for understanding
  the problem.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based ranker with explicit reasoning capture. Six scoring dimensions:
  Career Substance (40%), Skill Credibility (22%), Behavioral Availability (15%),
  Experience Quality (11%), Star Predictor (7%), Location (5%). The career
  substance component reads job titles and career descriptions rather than skills
  lists — the decisive signal against keyword-stuffer traps. An endorsement x
  duration trust multiplier on skills penalizes uncorroborated claims.
  Honeypots are excluded via 5 impossibility rules (e.g., future start dates,
  100+ years experience). Behavioral ghosts are down-weighted by availability
  score. Hidden gems (strong career signals but plain-language skills) receive a
  +0.05 bonus. The ranking step streams 100K candidates from JSONL using heapq
  for O(1) memory — no embeddings, no network, no GPU. Runtime: ~45 seconds.
  Each of the top-100 candidates receives a unique narrative reasoning string
  generated by a deterministic 5-stage Shadow Recruiter engine, plus a Prove It
  claim verification, Interview Blueprint, and HM Translator brief.

